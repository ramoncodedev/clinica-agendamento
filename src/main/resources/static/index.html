<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriClin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="logo-area">
      <span class="logo-leaf">🌿</span>
      <div class="logo-name">NutriClin</div>
      <div class="logo-tagline">Sistema de Agendamento</div>
    </div>
    <nav class="nav">
      <div class="nav-label">Agenda</div>
      <div class="nav-item active" data-section="agendamentos">
        <span class="nav-icon">📅</span> Agendamentos
      </div>
      <div class="nav-label">Cadastros</div>
      <div class="nav-item" data-section="pacientes">
        <span class="nav-icon">👤</span> Pacientes
      </div>
      <div class="nav-item" data-section="nutricionistas">
        <span class="nav-icon">🩺</span> Nutricionistas
      </div>
      <div class="nav-item" data-section="servicos">
        <span class="nav-icon">📋</span> Serviços
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="footer-date-label">Hoje</div>
      <div class="footer-date" id="today-label"></div>
    </div>
  </aside>

  <main class="main" id="main"></main>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-head">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-x" id="modal-x">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div class="toasts" id="toasts"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/pages/pacientes.js"></script>
  <script src="/js/pages/nutricionistas.js"></script>
  <script src="/js/pages/servicos.js"></script>
  <script src="/js/pages/agendamentos.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
