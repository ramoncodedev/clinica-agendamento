spring:
  application:
    name: clinica
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5431/clinica_db}
    username: ${DB_USERNAME:clinica_user}
    password: ${DB_PASSWORD:clinica_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.agendamento.clinica: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"