services:
  postgres:
    image: postgres:16-alpine
    container_name: clinica-db
    environment:
      POSTGRES_DB: clinica_db
      POSTGRES_USER: clinica_user
      POSTGRES_PASSWORD: clinica_pass
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:


  postgres_data: